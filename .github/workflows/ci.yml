name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    # Style and type checks plus once-only repo-hygiene gates.
    # Runs in ~10 seconds. Failing fast here saves the test matrix
    # from running on style-broken code. The em-dash check and the
    # origin-tag-presence gate live here (not in test) because they
    # are once-only checks; running them per-Python-version would
    # be redundant.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/BayyinahEnterprise/furqan-programming-language.git@v0.11.1"
          pip install -e ".[dev,onnx,gate11,gate11-rust]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy

      - name: Em-dash check
        run: |
          # CODE_OF_CONDUCT.md is Contributor Covenant v2.1 verbatim;
          # third-party text is excluded per the policy that bans
          # em-dashes from project-authored prose only.
          if LC_ALL=C.UTF-8 grep -rPn --exclude=CODE_OF_CONDUCT.md '[\x{2013}\x{2014}]' src/ tests/ docs/ README.md CHANGELOG.md pyproject.toml; then
            echo "Em-dash or en-dash found in source, tests, docs, README, CHANGELOG, or pyproject.toml"
            exit 1
          fi
          echo "Em-dash check: clean"

      - name: Origin tag presence gate
        run: python scripts/verify_origin_tags.py

  test-python-only:
    # The Python-only install path. Adapter tests self-skip via the
    # §7.11-enforced skip-guards. Pinning that the full pytest -q
    # suite passes here is the empirical guarantee that the no-
    # extras user does not see traceback-style failures.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/BayyinahEnterprise/furqan-programming-language.git@v0.11.1"
          pip install -e ".[dev,onnx]"

      - name: Run tests
        run: python -m pytest -q

      - name: Verify version sync
        run: |
          python -c "
          from furqan_lint import __version__
          import sys
          if sys.version_info >= (3, 11):
              import tomllib
          else:
              import tomli as tomllib
          with open('pyproject.toml', 'rb') as f:
              v = tomllib.load(f)['project']['version']
          assert __version__ == v, f'{__version__} != {v}'
          print(f'Version sync OK: {__version__}')
          "

  test-rust:
    # The Rust-extras install path. Runs the full pytest -q suite;
    # rust-adapter tests run for real, go-adapter tests self-skip.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/BayyinahEnterprise/furqan-programming-language.git@v0.11.1"
          pip install -e ".[dev,rust,onnx]"

      - name: Run tests
        run: python -m pytest -q

  test-go:
    # The Go-extras install path. Runs the full pytest -q suite;
    # go-adapter tests run for real, rust-adapter tests self-skip.
    # Sets up the Go 1.22 toolchain so the [go] extra's PEP 517
    # build hook can compile the bundled goast binary.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/BayyinahEnterprise/furqan-programming-language.git@v0.11.1"
          pip install -e ".[dev,go,onnx]"

      - name: Run tests
        run: python -m pytest -q

  test-full:
    # The everything-installed path. Pin that rust + go extras
    # coexist on a single environment without conflict and that
    # the full pytest -q suite passes with zero skips. Python 3.12
    # only; the matrix coverage of rust + go individually across
    # 3.10-3.13 is sufficient.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/BayyinahEnterprise/furqan-programming-language.git@v0.11.1"
          pip install -e ".[dev,rust,go,onnx]"

      - name: Run tests
        run: python -m pytest -q

  test-onnx-runtime:
    # The [onnx-runtime] + [onnx-profile] install path (v0.9.4
    # Part 5b(c)). Runs the full pytest -q suite so the
    # CHANGELOG-math gate runs at full strength in CI (round-34
    # HIGH-2b closure: pre-v0.9.4 the gate's onnxruntime-skip
    # workaround meant the gate never ran with full extras in
    # CI; arithmetic drift in the CHANGELOG ### Tests line was
    # caught only on developer machines).
    #
    # Single Python version (3.12) sufficient for substrate
    # coverage; the matrix's other jobs cover py 3.10-3.13
    # cross-cutting concerns. Both [onnx-runtime] (v0.9.3
    # numpy_divergence) and [onnx-profile] (v0.9.4 score_validity)
    # are installed so all five ONNX checkers run end-to-end.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/BayyinahEnterprise/furqan-programming-language.git@v0.11.1"
          pip install -e ".[dev,onnx,onnx-runtime,onnx-profile,gate11,gate11-rust]"

      - name: Run tests
        run: python -m pytest -q

  gate11-smoke-test:
    # Phase G11.0 / T10: end-to-end Sigstore sign + verify smoke
    # test. Runs only on push to `main` (not on PRs from forks)
    # because it requires the ambient GitHub OIDC token, which
    # forked-PR workflows do not receive. The smoke test exercises
    # the sign-then-verify round-trip on a fixture module via
    # `FURQAN_LINT_GATE11_SMOKE_TEST=1` per T06's smoke-test
    # contract.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/BayyinahEnterprise/furqan-programming-language.git@v0.11.1"
          pip install -e ".[dev,gate11]"

      - name: Sign and verify a fixture module via ambient OIDC
        env:
          FURQAN_LINT_GATE11_SMOKE_TEST: "1"
        run: python -m pytest tests/test_gate11_signing.py -v

      - name: Use the CLI to verify the bundle end to end
        run: |
          # The smoke test wrote an example fixture and bundle into
          # the test's tmp_path. For a CLI-shaped end-to-end pin we
          # also exercise `furqan-lint manifest verify` against a
          # bundle the workflow produces directly, rather than the
          # one in the test's tempdir which is cleaned up.
          python -c "
          import os, tempfile, subprocess, sys
          os.environ['FURQAN_LINT_GATE11_SMOKE_TEST'] = '1'
          # The smoke test in T06 already did the round-trip; here
          # we just confirm the CLI entry point is reachable.
          r = subprocess.run([sys.executable, '-m', 'furqan_lint.cli', '--help'],
                             capture_output=True, text=True, check=True)
          assert 'manifest' in r.stdout, r.stdout
          print('CLI help includes manifest subcommand')
          "

  gate11-rust-smoke-test:
    # Phase G11.1 / T06: end-to-end Sigstore sign + verify smoke
    # test for the Rust pipeline. Same gating as
    # gate11-smoke-test (push to main only; id-token: write).
    # The Rust pipeline reuses sigstore-python (no FFI to
    # sigstore-rs in v1; v1.5 horizon item per Yusuf Horizon
    # discipline), so the install matrix is the existing
    # [gate11-rust] extra plus the [rust] extra for the legacy
    # tree-sitter-rust adapter.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/BayyinahEnterprise/furqan-programming-language.git@v0.11.1"
          pip install -e ".[dev,gate11,gate11-rust,rust]"

      - name: Sign and verify a fixture .rs module via ambient OIDC
        env:
          FURQAN_LINT_GATE11_SMOKE_TEST: "1"
        run: |
          # Build a minimal .rs fixture, sign it via the manifest
          # init pipeline, then verify the resulting bundle.
          # Identity policy is asserted via --expected-identity
          # against the GitHub Actions OIDC SAN pattern.
          python -c "
          import os, subprocess, sys, tempfile, re
          from pathlib import Path
          tmp = Path(tempfile.mkdtemp())
          rs = tmp / 'lib.rs'
          rs.write_text('pub fn smoke(a: i32, b: i32) -> i32 { a + b }')
          # Sign:
          subprocess.run([sys.executable, '-m', 'furqan_lint.cli',
                          'manifest', 'init', str(rs)], check=True)
          bundle = rs.parent / (rs.name + '.furqan.manifest.sigstore')
          assert bundle.exists(), 'bundle not written'
          # Verify with the GitHub Actions OIDC SAN pattern:
          repo = os.environ['GITHUB_REPOSITORY']
          ref = os.environ['GITHUB_REF']
          pattern = f'https://github.com/{repo}/.github/workflows/ci.yml@{ref}'
          subprocess.run([sys.executable, '-m', 'furqan_lint.cli',
                          'manifest', 'verify', str(bundle),
                          '--expected-identity', pattern,
                          '--expected-issuer',
                          'https://token.actions.githubusercontent.com'],
                         check=True)
          print('Rust manifest signed + verified end to end via ambient OIDC')
          "

  gate11-go-smoke-test:
    # Phase G11.2 / T08 (al-Mursalat / v0.12.0): end-to-end
    # Sigstore sign + verify smoke test for the Go pipeline.
    # Same gating as gate11-smoke-test + gate11-rust-smoke-test
    # (push to main only; id-token: write). The Go pipeline
    # reuses sigstore-python (single dispatch through
    # verification.verify -> _verify_go private handler per
    # al-Mursalat T02 Route a1-via-args); the install matrix
    # is [gate11] + [go] (the latter for the goast binary
    # build hook).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/BayyinahEnterprise/furqan-programming-language.git@v0.11.1"
          pip install -e ".[dev,gate11,go]"

      - name: Sign and verify a fixture .go module via ambient OIDC
        env:
          FURQAN_LINT_GATE11_SMOKE_TEST: "1"
        run: |
          # Build a minimal .go fixture, sign it via the manifest
          # init pipeline, then verify the resulting bundle.
          # Identity policy is asserted via --expected-identity
          # against the GitHub Actions OIDC SAN pattern. Closes
          # F22 dispatch consolidation at the Go substrate
          # (al-Mursalat T02 Route a1-via-args; pre-v0.12.0 a
          # go manifest would fail closed at CASM-V-001).
          python -c "
          import os, subprocess, sys, tempfile, re
          from pathlib import Path
          tmp = Path(tempfile.mkdtemp())
          go = tmp / 'smoke.go'
          go.write_text('package smoke\n\nfunc Smoke(a int, b int) (int, error) {\n    return a + b, nil\n}\n')
          # Sign:
          subprocess.run([sys.executable, '-m', 'furqan_lint.cli',
                          'manifest', 'init', str(go)], check=True)
          bundle = go.parent / (go.name + '.furqan.manifest.sigstore')
          assert bundle.exists(), 'bundle not written'
          # Verify with the GitHub Actions OIDC SAN pattern:
          repo = os.environ['GITHUB_REPOSITORY']
          ref = os.environ['GITHUB_REF']
          pattern = f'https://github.com/{repo}/.github/workflows/ci.yml@{ref}'
          subprocess.run([sys.executable, '-m', 'furqan_lint.cli',
                          'manifest', 'verify', str(bundle),
                          '--expected-identity', pattern,
                          '--expected-issuer',
                          'https://token.actions.githubusercontent.com'],
                         check=True)
          print('Go manifest signed + verified end to end via ambient OIDC')
          "

  gate11-onnx-smoke-test:
    # Phase G11.3 / T10 (an-Naziat / v0.13.0): end-to-end
    # gate11-substrate smoke test for the ONNX pipeline.
    # Same gating as gate11-smoke-test + gate11-rust-smoke-test
    # + gate11-go-smoke-test (push to main only; id-token:
    # write). The ONNX pipeline reuses sigstore-python via
    # the single canonical dispatch entry
    # verification.verify -> _verify_onnx private handler
    # (function-local _LANGUAGE_DISPATCH four-entry surface
    # closed at v0.13.0 ship). The install matrix is
    # [gate11] + [onnx] (the latter for the onnx runtime
    # used by the make_relu_model fixture builder).
    #
    # Scope note: this job exercises the gate11-ONNX
    # verification substrate (fixture build + ModelProto
    # round-trip + canonicalization-bytes determinism)
    # rather than full Sigstore sign + verify, since
    # `manifest init` ONNX-awareness (populating the
    # module_identity.onnx nested structure from a
    # ModelProto) is out of an-Naziat scope and reserved
    # for a follow-on phase. The fixture-inventory pinning
    # in tests/test_gate11_onnx_smoke_test_fixture_inventory.py
    # is the substrate-of-record assertion here.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gate11,onnx]"

      - name: Build ONNX smoke-test fixture and exercise gate11-ONNX substrate
        env:
          FURQAN_LINT_GATE11_SMOKE_TEST: "1"
        run: |
          # Build a minimal .onnx fixture via make_relu_model
          # (substrate-actual builder name per T00 step 5
          # ONNX pre-flight verification), exercise the
          # graph-shape canonicalization layer, and verify
          # the canonical bytes are deterministic across
          # repeated builds.
          python -c "
          import sys, tempfile
          from pathlib import Path
          import onnx
          from tests.fixtures.onnx.builders import make_relu_model
          from furqan_lint.gate11.manifest_schema import (
              OnnxIdentitySection,
              ValueInfoSummary,
          )
          from furqan_lint.gate11.onnx_signature_canonicalization import (
              canonicalize_bytes,
          )
          tmp = Path(tempfile.mkdtemp())
          model_path = tmp / 'smoke.onnx'
          model = make_relu_model(opset_version=14)
          onnx.save(model, str(model_path))
          # Round-trip:
          loaded = onnx.load(str(model_path))
          assert loaded.graph.name == 'test_relu'
          assert loaded.graph.node[0].op_type == 'Relu'
          # Build canonical OnnxIdentitySection bytes and
          # assert determinism across two runs (rule 9 sort
          # discipline; rule 10 dim_param preservation):
          section = OnnxIdentitySection(
              opset_imports=tuple((op.domain, op.version) for op in loaded.opset_import),
              ir_version=loaded.ir_version,
              inputs=tuple(
                  ValueInfoSummary(
                      name=vi.name,
                      dtype='FLOAT',
                      shape=tuple(
                          (d.dim_param if d.HasField('dim_param') else d.dim_value)
                          for d in vi.type.tensor_type.shape.dim
                      ),
                  )
                  for vi in loaded.graph.input
              ),
              outputs=tuple(
                  ValueInfoSummary(
                      name=vi.name,
                      dtype='FLOAT',
                      shape=tuple(
                          (d.dim_param if d.HasField('dim_param') else d.dim_value)
                          for d in vi.type.tensor_type.shape.dim
                      ),
                  )
                  for vi in loaded.graph.output
              ),
          )
          bytes_a = canonicalize_bytes(section)
          bytes_b = canonicalize_bytes(section)
          assert bytes_a == bytes_b, 'determinism violation'
          print('ONNX gate11 smoke test: build + round-trip + canonicalization PASS')
          "

  gate11-self-smoke-test:
    # Phase G12.0 (al-Basirah / v1.0.0) T07: end-to-end CI smoke
    # test for the self-attestation flow. Generates a fixture
    # self-manifest, signs it via Sigstore ambient OIDC with
    # fixture identity, and verifies it via the verify-self
    # subcommand. Parallel to gate11-smoke-test (G11.0),
    # gate11-rust-smoke-test (G11.1), gate11-go-smoke-test
    # (G11.2 al-Mursalat T08), gate11-onnx-smoke-test (G11.3
    # an-Naziat T10).
    #
    # Per §5.1 step 4 failure mode #5 of al-Basirah dispatch
    # prompt: the fixture identity is test@bayyinah.example.com
    # (NOT the production release identity). Smoke test passing
    # does NOT prove that real-world Relying-Party verification
    # will succeed against the production release; closure of
    # failure mode #5 requires post-ship verification by an
    # external party using the production identity (cross-
    # instance verification path open per methodology v1.1
    # §0.1).
    #
    # Same gating as prior gate11-*-smoke-test jobs (push to
    # main only; id-token: write).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gate11]"
          pip install sigstore

      - name: Exercise self-attestation flow end-to-end
        env:
          FURQAN_LINT_GATE11_SELF_SMOKE_TEST: "1"
        run: |
          # Generate fixture self-manifest:
          python -m furqan_lint.gate11.self_manifest \
            --version "0.0.0-smoke" \
            --output self_manifest.json
          # Sign via Sigstore (ambient OIDC at GitHub Actions):
          python -m sigstore sign \
            --bundle self_manifest.bundle \
            self_manifest.json
          # Exercise structural-honesty: assert the manifest +
          # bundle were produced and are well-formed. The full
          # verify-self flow requires the artifacts be uploaded
          # to a Release URL (production-only); smoke-test
          # contents-verification is sufficient for CI parity.
          python -c "
          import json
          from pathlib import Path
          from furqan_lint.gate11.manifest_schema import Manifest

          manifest = json.loads(Path('self_manifest.json').read_text())
          parsed = Manifest.from_dict(manifest)
          assert parsed.module_identity['language'] == 'python'
          assert parsed.linter_substrate_attestation['checker_set_hash'].startswith('sha256:')
          assert Path('self_manifest.bundle').stat().st_size > 0
          print('gate11-self-smoke-test: manifest generated + signed + parseable PASS')
          "
