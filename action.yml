name: "Furqan Lint"
description: "Structural-honesty checks for Python code"
author: "Bilal Syed Arfeen"
branding:
  icon: "shield"
  color: "blue"

inputs:
  path:
    description: "File or directory to check"
    required: false
    default: "."
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
  gate11:
    description: "Enable Sigstore-CASM Gate 11 verification on bundles in <path>"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install furqan-lint
      shell: bash
      run: |
        pip install "git+https://github.com/BayyinahEnterprise/furqan-programming-language.git@v0.11.1"
        if [ "${{ inputs.gate11 }}" = "true" ]; then
          pip install "git+https://github.com/BayyinahEnterprise/furqan-lint.git@${{ github.action_ref }}#egg=furqan-lint[gate11]"
        else
          pip install "git+https://github.com/BayyinahEnterprise/furqan-lint.git@${{ github.action_ref }}"
        fi

    - name: Run furqan-lint
      shell: bash
      run: |
        if [ "${{ inputs.gate11 }}" = "true" ]; then
          furqan-lint check --gate11 ${{ inputs.path }}
        else
          furqan-lint check ${{ inputs.path }}
        fi
