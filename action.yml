name: "Furqan Lint"
description: "Structural-honesty checks for Python code"
author: "Bilal Syed Arfeen"
branding:
  icon: "shield"
  color: "blue"

inputs:
  path:
    description: "File or directory to check"
    required: false
    default: "."
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
  furqan-lint-version:
    description: "furqan-lint version to install (empty = install latest from main)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install furqan-lint
      shell: bash
      run: |
        pip install "git+https://github.com/BayyinahEnterprise/furqan-programming-language.git@v0.11.1"
        if [ -n "${{ inputs.furqan-lint-version }}" ]; then
          pip install "furqan-lint==${{ inputs.furqan-lint-version }}"
        else
          pip install "git+https://github.com/BayyinahEnterprise/furqan-lint.git"
        fi

    - name: Run furqan-lint
      shell: bash
      run: furqan-lint check ${{ inputs.path }}
